<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Counter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <section id="commandCenter" class="command-center"></section>

    <nav class="tabs" aria-label="Views">
      <button id="dailyTab" class="active" data-i18n="tabDaily">Daily</button>
      <button id="weeklyTab" data-i18n="tabWeekly">Weekly</button>
      <button id="totalTab" data-i18n="tabTotal">Total</button>
      <button id="settingsTab" title="Settings" aria-label="Settings" data-i18n-title="tabSettings">⚙</button>
    </nav>

    <main id="content"></main>
  </div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
